spring.application.name=unidrive-server
spring.datasource.url=jdbc:sqlite:target/unidrive-server.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1

spring.sql.init.mode=always

# Allow larger instructor publishes / student submissions than Spring Boot's default (~1MB)
spring.servlet.multipart.max-file-size=256MB
spring.servlet.multipart.max-request-size=256MB
server.tomcat.max-swallow-size=256MB
server.tomcat.max-http-form-post-size=256MB
