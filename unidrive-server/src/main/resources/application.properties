spring.application.name=unidrive-server
spring.datasource.url=jdbc:sqlite:unidrive-server/target/unidrive-server.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=1

# Keep SQL initialization explicit until schema scripts are added in later TDD slices.
spring.sql.init.mode=never
